name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  cpu-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gs_pipeline/requirements-cpu.txt
      - name: Run pytest (193 expected, 1 GPU-gated skip)
        run: pytest gs_pipeline -v
