name: docker

# Builds the GPU training image (CUDA 12.4 + torch 2.4.1 + precompiled
# gsplat 1.4.0) and pushes it to Docker Hub.
#
# Triggers:
#   - push to main          -> tags `edge` and `main-<short-sha>`
#   - tag push `v*`         -> semver tags + `latest`
#   - manual dispatch       -> custom tag
#
# Repo configuration the workflow expects:
#   secrets:
#     DOCKERHUB_USERNAME    Docker Hub username (e.g. swdsfd)
#     DOCKERHUB_TOKEN       Docker Hub access token with read+write+delete
#   variables (optional, falls back to swdsfd/gs-trainer):
#     DOCKERHUB_NAMESPACE   Namespace to push under (e.g. swdsfd)
#     IMAGE_NAME            Image repo name (default: gs-trainer)
#
# Note: this image is large (CUDA + torch + gsplat compile). Build can take
# 30-60 min on GitHub's standard runner. The job verifies the image builds
# and pushes; functional verification (actually training splats) requires a
# GPU host and is out of scope for CI.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to apply (e.g. rc1)"
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        id: img
        run: |
          NAMESPACE="${{ vars.DOCKERHUB_NAMESPACE }}"
          NAMESPACE="${NAMESPACE:-swdsfd}"
          NAME="${{ vars.IMAGE_NAME }}"
          NAME="${NAME:-gs-trainer}"
          echo "image=${NAMESPACE}/${NAME}" >> "$GITHUB_OUTPUT"

      - name: Free up runner disk space
        # The CUDA + torch + gsplat layers are large; default runners run out
        # of disk during the final push if we don't clear the preinstalled
        # toolchains.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                       /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.image }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Dockerfile expects gs_pipeline/ as the build context (so it can
          # COPY requirements-*.txt and gs_pipeline/ as siblings).
          context: gs_pipeline
          file: gs_pipeline/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
