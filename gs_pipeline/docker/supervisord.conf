; gs_pipeline: run the Streamlit UI and the trainer watcher side-by-side.
; supervisord here owns both processes; if either dies, supervisord restarts
; it. The container exits only if supervisord itself stops.

[supervisord]
nodaemon=true
logfile=/data/logs/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info

[unix_http_server]
file=/tmp/supervisor.sock

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

; NOTE: the max upload size is NOT passed as a CLI flag here. A hardcoded flag
; would override (CLI > env in streamlit) and silently diverge from the
; MAX_UPLOAD_GB the UI shows the user. entrypoint.sh derives
; STREAMLIT_SERVER_MAX_UPLOAD_SIZE (MB) from MAX_UPLOAD_GB so the enforced limit
; and the displayed limit always come from a single source.
[program:ui]
command=streamlit run /app/gs_pipeline/ui/app.py
environment=PYTHONPATH=/app
autostart=true
autorestart=true
stdout_logfile=/data/logs/ui.out
stderr_logfile=/data/logs/ui.err
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stopsignal=TERM
stopwaitsecs=10

; Keep the command on ONE line. Multi-line `command=` (indented continuation)
; relies on every supervisord version tokenising embedded newlines correctly
; via shlex; it is the classic supervisord footgun and not worth the risk on a
; client deployment. The watcher's run_forever() never exits on its own, so
; autorestart only fires on a real crash.
[program:worker]
command=python -m gs_pipeline.trainer.watcher --inbox /data/inbox --work /data/work --outbox /data/outbox --logs /data/logs --config-yaml /app/gs_pipeline/trainer/config.yaml --quality-preset Auto
environment=PYTHONPATH=/app
autostart=true
autorestart=true
stdout_logfile=/data/logs/worker.out
stderr_logfile=/data/logs/worker.err
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
stopsignal=TERM
stopwaitsecs=30
